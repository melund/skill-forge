context:
  skill: literature-review
package:
  name: agent-skill-${{ skill }}
  version: "0.0.3"
source:
  git: https://github.com/k-dense-ai/claude-scientific-skills
  rev: effb57c5699c1d400ef461a7aa80fc6693939805
build:
  number: 0
  noarch: generic
  script:
    - mkdir -p $PREFIX/share/agent-skills/${{ skill }}
    - cp -R scientific-skills/${{ skill }}/* $PREFIX/share/agent-skills/${{ skill }}
tests:
  - package_contents:
      files:
        - share/agent-skills/${{ skill }}/SKILL.md
  - script:
      - agentskills validate $CONDA_PREFIX/share/agent-skills/${{ skill }}
    requirements:
      run:
        - skills-ref
about:
  summary: Agent skill for systematic literature reviews
  description: |
    Conduct comprehensive, systematic literature reviews using
    multiple academic databases (PubMed, arXiv, bioRxiv, Semantic Scholar, etc.).
    - PICO framework for research question definition
    - Multi-database search strategies
    - Citation verification and formatting (APA, Nature, Vancouver, etc.)
    - Professional markdown and PDF output generation
  homepage: https://skills.sh/k-dense-ai/claude-scientific-skills/literature-review
  repository: https://github.com/k-dense-ai/claude-scientific-skills
  documentation: https://skills.sh/k-dense-ai/claude-scientific-skills/literature-review
  license: MIT
  license_file: LICENSE.md
