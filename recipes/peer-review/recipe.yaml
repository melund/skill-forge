context:
  skill: peer-review
package:
  name: agent-skill-${{ skill }}
  version: "0.0.1"
source:
  git: https://github.com/k-dense-ai/claude-scientific-skills
  rev: 575f1e586f6b484feb3cba040b6e29f2a56f3c74
build:
  number: 0
  noarch: generic
  script:
    - mkdir -p $PREFIX/share/agent-skills/${{ skill }}
    - cp -R scientific-skills/${{ skill }}/* $PREFIX/share/agent-skills/${{ skill }}
tests:
  - package_contents:
      files:
        - share/agent-skills/${{ skill }}/SKILL.md
  - script:
      - agentskills validate $CONDA_PREFIX/share/agent-skills/${{ skill }}
    requirements:
      run:
        - skills-ref
about:
  summary: Agent skill for scientific peer review
  description: |
    Conduct rigorous scientific peer reviews following academic standards.
    - Structured evaluation of methodology, results, and conclusions
    - Constructive feedback with specific, actionable recommendations
    - Assessment of statistical validity and reproducibility
    - Professional review reports in standard academic format
  homepage: https://skills.sh/k-dense-ai/claude-scientific-skills/peer-review
  repository: https://github.com/k-dense-ai/claude-scientific-skills
  documentation: https://skills.sh/k-dense-ai/claude-scientific-skills/peer-review
  license: MIT
  license_file: LICENSE.md
