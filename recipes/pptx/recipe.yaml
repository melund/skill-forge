context:
  skill: pptx

package:
  name: agent-skill-${{ skill }}
  version: "0.0.1"

source:
  git: https://github.com/anthropics/skills
  rev: 98669c11ca63e9c81c11501e1437e5c47b556621

build:
  number: 0
  noarch: generic
  script:
    - mkdir -p $PREFIX/share/agent-skills/${{ skill }}
    - cp -R skills/${{ skill }}/* $PREFIX/share/agent-skills/${{ skill }}

tests:
  - package_contents:
      files:
        - share/agent-skills/${{ skill }}/SKILL.md
        - share/agent-skills/${{ skill }}/editing.md
        - share/agent-skills/${{ skill }}/pptxgenjs.md
        - share/agent-skills/${{ skill }}/scripts/*.py
  - script:
      - agentskills validate $CONDA_PREFIX/share/agent-skills/${{ skill }}
    requirements:
      run:
        - skills-ref

about:
  summary: Agent skill for creating and editing PowerPoint presentations
  description: |
    Create, edit, read, and manipulate PowerPoint presentations with design
    guidance and quality assurance workflows:
    - Reading/extracting text from existing .pptx files
    - Editing presentations via template unpacking and repacking
    - Creating decks from scratch using PptxGenJS
    - Curated color palettes, typography pairings, and layout patterns
    - Mandatory QA process with visual inspection via subagents
  homepage: https://skills.sh/anthropics/skills/pptx
  repository: https://github.com/anthropics/skills
  documentation: https://skills.sh/anthropics/skills/pptx
  license: LicenseRef-Anthropic
  license_file: skills/pptx/LICENSE.txt
