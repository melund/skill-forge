context:
  skill: human-writing-en

package:
  name: agent-skill-${{ skill }}
  version: "0.0.2"

source:
  - path: ../../LICENSE

build:
  number: 0
  noarch: generic
  script:
    - mkdir -p $PREFIX/share/agent-skills/${{ skill }}
    - cp $RECIPE_DIR/SKILL.md $PREFIX/share/agent-skills/${{ skill }}/SKILL.md

tests:
  - package_contents:
      files:
        - share/agent-skills/${{ skill }}/SKILL.md
      strict: true
  - script:
      - agentskills validate $CONDA_PREFIX/share/agent-skills/${{ skill }}
    requirements:
      run:
        - skills-ref

about:
  summary: Human-sounding English writing style for AI agents
  description: |
    Writing style instructions that produce English text indistinguishable
    from human-authored prose:
    - Avoid overused AI vocabulary and sentence patterns
    - Use active voice, short sentences, and concrete details
    - Vary rhythm, structure, and paragraph length naturally
    - Eliminate promotional tone, filler phrases, and hedging
    - Prefer simple punctuation and everyday words
  homepage: https://github.com/pavelzw/skill-forge
  repository: https://github.com/pavelzw/skill-forge
  documentation: https://github.com/pavelzw/skill-forge
  license: BSD-3-Clause
  license_file: LICENSE
